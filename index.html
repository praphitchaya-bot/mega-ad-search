.tag-Other{ background: #f5f5f5; color: #777; }
.tag-obj  { background: #fef9c3; color: #854d0e; }
.tag-week { background: #f0fdf4; color: #166534; }

.metrics { display: grid; grid-template-columns: repeat(3, auto); gap: 6px 14px; text-align: right; }
.m-item { }
.m-label { font-size: 9px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.m-val   { font-size: 15px; font-weight: 800; line-height: 1.2; }
.m-val.spend { color: #1d1d1f; }
.m-val.good  { color: #15803d; }
.m-val.warn  { color: #b45309; }
.m-val.na    { color: #ccc; font-size: 13px; font-weight: 400; }

.empty { text-align: center; padding: 60px 20px; color: #bbb; }
.empty .icon { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 13px; line-height: 2; }

.more-note { text-align: center; padding: 14px; color: #aaa; font-size: 11px; }
mark { background: #fff3b0; border-radius: 2px; }

// Populate objective filter
const objs = [...new Set(ADS.map(a => a.o).filter(Boolean))].sort();
const oSel = document.getElementById('fObj');
objs.forEach(o => { const opt = document.createElement('option'); opt.textContent = o; oSel.appendChild(opt); });

const teamTagClass = { 'Team A':'tag-A','Team B':'tag-B','Team C':'tag-C','KOL':'tag-KOL','Inter':'tag-Inter','CRM':'tag-CRM','Other':'tag-Other' };

function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function fmt(v, prefix='') {
  if (v == null) return null;
  return prefix + (typeof v === 'number' ? (v % 1 === 0 ? v.toLocaleString() : v.toFixed(2)) : v);
}

function search() {
  const q    = document.getElementById('q').value.trim();
  const team = document.getElementById('fTeam').value;
  const obj  = document.getElementById('fObj').value;

  let res = ADS;
  if (q)    res = res.filter(a => a.n.toLowerCase().includes(q.toLowerCase()));
  if (team) res = res.filter(a => a.t === team);
  if (obj)  res = res.filter(a => a.o === obj);

  res = res.sort((a,b) => b.s - a.s);

  document.getElementById('meta').textContent = res.length
    ? res.length + ' ads · เรียงตาม Spend สูง→ต่ำ'
    : '';

  const container = document.getElementById('results');
  if (!q && !team && !obj) {
    container.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>พิมพ์ชื่อ Ad หรือเลือก Filter เพื่อค้นหา</p></div>';
    return;
  }
  if (res.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">🤷</div><p>ไม่พบ ad ที่ตรงกัน</p></div>';
    return;
  }

  const re = q ? new RegExp('(' + esc(q) + ')', 'gi') : null;
  const hl = name => re ? name.replace(re, '<mark>$1</mark>') : name;

  container.innerHTML = res.slice(0, 120).map(a => {
    const tc = teamTagClass[a.t] || 'tag-Other';
    const ctrVal = a.ctr != null ? a.ctr + '%' : null;
    const ctrCls = a.ctr == null ? 'na' : a.ctr >= 1.5 ? 'good' : a.ctr < 0.5 ? 'warn' : '';
    const dmVal  = a.dm != null ? '฿' + a.dm.toFixed(0) : null;
    const cpmVal = a.cpm != null ? '฿' + a.cpm.toFixed(0) : null;
    const peVal  = a.pe != null ? '฿' + a.pe.toFixed(2) : null;

    return \`<div class="ad-card">
      <div>
        <div class="ad-name">\${hl(a.n)}</div>
        <div class="ad-tags">
          <span class="tag \${tc}">\${a.t}</span>
          \${a.o ? \`<span class="tag tag-obj">\${a.o}</span>\` : ''}
          <span class="tag tag-week">\${a.w}</span>
        </div>
      </div>
      <div class="metrics">
        <div class="m-item">
          <div class="m-label">Spend</div>
          <div class="m-val spend">฿\${a.s.toLocaleString()}</div>
        </div>
        <div class="m-item">
          <div class="m-label">CTR</div>
          <div class="m-val \${ctrCls}">\${ctrVal ?? '–'}</div>
        </div>
        <div class="m-item">
          <div class="m-label">CPM</div>
          <div class="m-val">\${cpmVal ?? '–'}</div>
        </div>
        <div class="m-item">
          <div class="m-label">Cost/PE</div>
          <div class="m-val">\${peVal ?? '–'}</div>
        </div>
        <div class="m-item">
          <div class="m-label">Cost/DM</div>
          <div class="m-val">\${dmVal ?? '–'}</div>
        </div>
        \${a.r ? \`<div class="m-item"><div class="m-label">Reach</div><div class="m-val">\${a.r.toLocaleString()}</div></div>\` : '<div></div>'}
      </div>
    </div>\`;
  }).join('');

  if (res.length > 120) {
    container.insertAdjacentHTML('beforeend',
      \`<div class="more-note">แสดง 120 จาก \${res.length} — พิมพ์ให้เจาะจงขึ้น</div>\`);
  }
}
</script>
